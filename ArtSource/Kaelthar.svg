<svg width="100%" viewBox="0 0 680 880" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kaelthar, colossal void knight concept portrait</title>
<desc>A towering faceless armored knight in dark purple-black armor with glowing violet fractures, a cracked soul glowing in the chest, two narrow white-violet eye slits, a massive abyssal anchor weapon fused to the right arm, broken chains and floating anchors orbiting the shoulders, a tattered void cape, and a purple-cyan energy aura over corrupted ground.</desc>
